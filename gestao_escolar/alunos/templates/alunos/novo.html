{% extends 'base.html' %}
{% load static %}

{% block title %}Novo Aluno - IFRN{% endblock title %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'alunos/css/estilo.css' %}">
{% endblock extra_css %}

{% block content %}
<section class="secao-alunos">
    <h2>Cadastrar Novo Aluno</h2>

    <form class="formulario-aluno" action="#" method="post">
        <div class="campo">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Ex.: João da Silva" required>
        </div>

        <div class="campo">
            <label for="matricula">Matrícula</label>
            <input type="text" id="matricula" name="matricula" placeholder="Ex.: 20260010" required>
        </div>

        <div class="campo">
            <label for="curso">Curso</label>
            <select id="curso" name="curso" required>
                <option value="">-- Selecione um curso --</option>
                <option value="informatica">Informática</option>
                <option value="apicultura">Apicultura</option>
                <option value="alimentos">Alimentos</option>
            </select>
        </div>

        <div class="acoes-formulario">
            <a href="{% url 'alunos:lista' %}" class="botao botao-vermelho">Cancelar</a>
            <button type="submit" class="botao botao-verde">Salvar</button>
        </div>
    </form>
</section>
{% endblock content %}
